name: Test Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-coverage-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-target-

      - name: Generate coverage report
        run: |
          cargo tarpaulin --workspace --out Xml --output-dir coverage-report \
            --exclude-files "target/*" \
            --exclude-files "**/tests/*" \
            --exclude-files "**/benches/*" \
            --ignore-panics \
            --skip-clean

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-report/cobertura.xml
          directory: ./coverage-report
          flags: unittests
          name: auria-coverage
          fail_ci_if_error: false

      - name: Generate HTML report
        run: |
          cargo tarpaulin --workspace --out Html --output-dir coverage-html \
            --exclude-files "target/*" \
            --exclude-files "**/tests/*"

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-html/tarpaulin-report.html
          retention-days: 30

      - name: Upload XML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage-report/cobertura.xml
          retention-days: 30

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: coverage
    if: always()
    steps:
      - name: Download XML report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
          path: coverage

      - name: Generate summary
        run: |
          if [ -f coverage/cobertura.xml ]; then
            echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Parse coverage from XML
            total_lines=$(grep -oP 'total-lines="\K[0-9]+' coverage/cobertura.xml || echo "0")
            covered_lines=$(grep -oP 'total-covered="\K[0-9]+' coverage/cobertura.xml || echo "0")
            
            if [ "$total_lines" -gt 0 ]; then
              percentage=$((covered_lines * 100 / total_lines))
              echo "### Line Coverage: ${percentage}%" >> $GITHUB_STEP_SUMMARY
              echo "- Lines covered: ${covered_lines}" >> $GITHUB_STEP_SUMMARY
              echo "- Total lines: ${total_lines}" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Add link to artifact
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📊 [Download detailed HTML report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not available" >> $GITHUB_STEP_SUMMARY
          fi